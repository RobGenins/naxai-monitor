services:
  - type: web
    name: naxai-monitor
    runtime: node
    repo: https://github.com/RobGenins/naxai-monitor
    plan: free
    buildCommand: npm install && npm run download-dist
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPTIME_KUMA_PORT
        value: "3001"
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
